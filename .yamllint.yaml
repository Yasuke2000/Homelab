---
# ---------------------------------------------------------------------------
# yamllint configuration for homelab repo
# ---------------------------------------------------------------------------
extends: default

rules:
  line-length:
    max: 120
    level: warning
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  document-start: disable
  braces:
    max-spaces-inside: 1
