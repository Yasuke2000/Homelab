# ---------------------------------------------------------------------------
# sops configuration — age encryption for all secrets
#
# SETUP STEPS:
#   1. Generate age key on your workstation:
#        age-keygen -o ~/.config/sops/age/keys.txt
#
#   2. Get your public key:
#        age-keygen -y ~/.config/sops/age/keys.txt
#        → prints: age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#
#   3. For each NixOS node, generate a host key during nixos-anywhere deploy:
#        The key is derived from the SSH host key by nixos-anywhere automatically
#        OR generate manually: age-keygen -o /var/lib/sops-nix/key.txt
#        Then get its pubkey: age-keygen -y /var/lib/sops-nix/key.txt
#
#   4. Replace all TODO pubkeys below with your actual keys
#
#   5. Create/edit secrets: sops secrets/secrets.yaml
# ---------------------------------------------------------------------------

creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          # TODO: your workstation age public key (for editing secrets)
          - age1XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX  # workstation

          # TODO: node1 host age public key (so node1 can decrypt at boot)
          - age1YYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYYY  # node1

          # TODO: node2 host age public key
          - age1ZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZ  # node2

          # TODO: node3 host age public key
          - age1AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA  # node3
