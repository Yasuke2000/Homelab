---
name: Repo Visualizer

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  diagram:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate repo diagram
        uses: githubocto/repo-visualizer@0.9.1
        with:
          output_file: diagram.svg
          excluded_paths: "secrets,.github,flake.lock"
          excluded_globs: "**/*.lock;**/.gitignore"
          root_path: ""
          commit_message: "chore: update repo diagram [skip ci]"
