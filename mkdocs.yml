site_name: David's Homelab
site_description: Sovereign bare-metal NixOS homelab — K3s HA cluster on HP EliteDesk 800 G4
site_url: https://yasuke2000.github.io/Homelab
repo_url: https://github.com/Yasuke2000/Homelab
repo_name: Yasuke2000/Homelab
edit_uri: edit/master/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit

nav:
  - Home: README.md
  - Deployment:
      - Deployment Guide: docs/deployment-guide.md
      - Node Provisioning: docs/node-provisioning.md
      - Staging to Production: docs/staging-to-prod.md
  - Reference:
      - Cert Manager TLS: docs/cert-manager-tls.md
      - Gotchas: docs/gotchas.md
      - Recovery: docs/recovery.md
      - Project Summary: docs/project-summary.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Yasuke2000/Homelab
