site_name: David's Homelab
site_description: Sovereign bare-metal NixOS homelab — 3-node K3s HA cluster, fully declarative GitOps
site_url: https://homelab.daviddelporte.com
repo_url: https://github.com/Yasuke2000/Homelab
repo_name: Yasuke2000/Homelab
edit_uri: edit/master/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit

nav:
  - Home: index.md
  - Hardware & Cost: hardware.md
  - Deployment:
      - Deployment Guide: deployment-guide.md
      - Node Provisioning: node-provisioning.md
      - Next Steps Checklist: next-steps.md
      - Staging to Production: staging-to-prod.md
  - Operations:
      - Alerting (Discord): alerting.md
      - Cert Manager TLS: cert-manager-tls.md
      - Recovery: recovery.md
  - Reference:
      - Gotchas: gotchas.md
      - Project Summary: project-summary.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Yasuke2000/Homelab
