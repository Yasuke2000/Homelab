---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pelican
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/homelab.git  # TODO
    targetRevision: HEAD
    path: apps/pelican/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: pelican
  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
