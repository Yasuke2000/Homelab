---
# ---------------------------------------------------------------------------
# Seerr v3.1.0 — media request manager (official Jellyseerr/Overseerr successor)
# Patches 3 security CVEs from Jellyseerr. Auto-migrates existing database.
# Connect to Jellyfin at http://jellyfin.media.svc.cluster.local:8096
# ---------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: media
  labels:
    app: seerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: seerr
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 1000:1000 /app/config']
          volumeMounts:
            - name: config
              mountPath: /app/config
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:v3.1.0
          ports:
            - containerPort: 5055
              name: http
          env:
            - name: LOG_LEVEL
              value: info
            - name: TZ
              value: Europe/Brussels
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyseerr-config

---
# Keep existing PVC — Seerr auto-migrates Jellyseerr database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyseerr-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: seerr
  namespace: media
spec:
  selector:
    app: seerr
  ports:
    - port: 5055
      targetPort: 5055

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seerr
  namespace: media
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: seerr-tls
      hosts:
        - requests.daviddelporte.com
  rules:
    - host: requests.daviddelporte.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seerr
                port:
                  number: 5055
