---
# ---------------------------------------------------------------------------
# Loki — centralized log aggregation (monolithic mode)
# Promtail DaemonSet ships logs from all 3 nodes → Loki → queryable in Grafana
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Yasuke2000/Homelab.git
    targetRevision: master
    path: apps/loki/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
