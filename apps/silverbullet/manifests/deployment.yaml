---
# ---------------------------------------------------------------------------
# SilverBullet — self-hosted markdown wiki / second brain
# https://silverbullet.md
#
# Single binary, no database needed — data stored as plain .md files on a PVC.
# ---------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: silverbullet
  namespace: silverbullet
  labels:
    app: silverbullet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: silverbullet
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: silverbullet
    spec:
      containers:
        - name: silverbullet
          image: ghcr.io/silverbulletmd/silverbullet:2.5.2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: SB_USER
              # SilverBullet v2.x requires format "username:password" as a single value.
              # The secret's "password" key must contain the full "admin:actualpassword" string.
              # $(VAR_NAME) substitution does NOT work for valueFrom secrets in Kubernetes.
              valueFrom:
                secretKeyRef:
                  name: silverbullet-secrets
                  key: password
          volumeMounts:
            - name: space
              mountPath: /space
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: space
          persistentVolumeClaim:
            claimName: silverbullet-space

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: silverbullet-space
  namespace: silverbullet
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: silverbullet
  namespace: silverbullet
spec:
  selector:
    app: silverbullet
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: silverbullet
  namespace: silverbullet
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: silverbullet-tls
      hosts:
        - notes.daviddelporte.com
  rules:
    - host: notes.daviddelporte.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: silverbullet
                port:
                  number: 3000
