---
# ---------------------------------------------------------------------------
# Traefik v3 — Ingress controller
#
# CRITICAL: v2 rule syntax is DEPRECATED in v3
# Use: Host(`domain.com`) — backticks required
# NOT: Host:domain.com  (v2 syntax)
# See: docs/gotchas.md — Traefik section
#
# Traefik gets a MetalLB IP from the homelab-pool (10.0.20.100)
# TODO: verify chart version — https://artifacthub.io/packages/helm/traefik/traefik
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"  # after MetalLB, before apps
spec:
  project: default

  source:
    repoURL: https://helm.traefik.io/traefik
    chart: traefik
    # TODO: pin to latest stable v3 chart
    targetRevision: "33.2.1"
    helm:
      valuesObject:
        deployment:
          replicas: 2   # HA across 2 nodes (3rd is spare)

        service:
          type: LoadBalancer
          # Request a specific MetalLB IP for DNS consistency
          # TODO: set this to an IP in your MetalLB pool
          spec:
            loadBalancerIP: "10.0.20.100"

        ports:
          web:
            port: 80
            redirectTo:
              port: websecure  # force HTTPS
          websecure:
            port: 443
            tls:
              enabled: true

        # Traefik dashboard — protected, internal access only
        ingressRoute:
          dashboard:
            enabled: true
            # TODO: set your domain
            # matchRule: Host(`traefik.daviddelporte.com`)
            entryPoints:
              - websecure
            middlewares:
              - name: dashboard-auth

        # Let cert-manager handle TLS via IngressRoute annotations
        providers:
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true  # needed for shared cert secrets
          kubernetesIngress:
            enabled: true

        # Tolerate control-plane nodes (all our nodes are control-plane + worker)
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
            operator: Exists

        # Prometheus metrics
        metrics:
          prometheus:
            enabled: true

        logs:
          general:
            level: INFO
          access:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
