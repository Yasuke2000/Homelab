---
# ---------------------------------------------------------------------------
# MetalLB IP pool — separate Application so the pool config is GitOps-managed
#
# The main metallb Application deploys the Helm chart (controller + speaker).
# This Application manages the IPAddressPool and L2Advertisement CRDs.
# Must sync AFTER metallb CRDs are installed (sync-wave "-3").
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default

  source:
    repoURL: https://github.com/Yasuke2000/Homelab.git
    targetRevision: master
    path: apps/metallb
    directory:
      include: "ip-pool.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
