---
# ---------------------------------------------------------------------------
# RomM — ROM manager with EmulatorJS integration
# ROMs stored on Synology DS918+ NFS mount (10.0.20.14)
# NFS share path: /volume1/roms (create in Synology DSM → File Station)
# ---------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: romm
  namespace: romm
  labels:
    app: romm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: romm
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: romm
    spec:
      enableServiceLinks: false
      containers:
        - name: romm
          image: rommapp/romm:4.7.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              value: romm-mariadb
            - name: DB_NAME
              value: romm
            - name: DB_USER
              value: romm
            - name: DB_PASSWD
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: dbPassword  # TODO: add to secrets/secrets.yaml
            - name: ROMM_AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: secretKey   # TODO: add to secrets/secrets.yaml
            # IGDB metadata provider (cover art, descriptions, ratings)
            - name: IGDB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: igdbClientId
            - name: IGDB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: igdbClientSecret
            # ScreenScraper — excellent retro artwork (3D boxes, manuals, cartridge art)
            - name: SCREENSCRAPER_USER
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: screenschraperUser
            - name: SCREENSCRAPER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: screenschraperPassword
            # RetroAchievements — achievement tracking integration
            - name: RETROACHIEVEMENTS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: retroachievementsApiKey
            # Metadata enrichment APIs
            - name: HASHEOUS_API_ENABLED
              value: "true"
            - name: PLAYMATCH_API_ENABLED
              value: "true"
            - name: HLTB_API_ENABLED
              value: "true"
            # Scan settings
            - name: SCAN_TIMEOUT
              value: "14400"
            - name: ENABLE_RESCAN_ON_FILESYSTEM_CHANGE
              value: "true"
            - name: RESCAN_ON_FILESYSTEM_CHANGE_DELAY
              value: "5"
          volumeMounts:
            - name: roms
              mountPath: /romm/library
            - name: resources
              mountPath: /romm/resources
            - name: assets
              mountPath: /romm/assets
            - name: config
              mountPath: /romm/config
            - name: redis-data
              mountPath: /redis-data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 1000m
      volumes:
        - name: roms
          nfs:
            server: 10.0.20.14
            path: /volume1/roms
        - name: resources
          persistentVolumeClaim:
            claimName: romm-resources
        - name: assets
          persistentVolumeClaim:
            claimName: romm-assets
        - name: config
          persistentVolumeClaim:
            claimName: romm-config
        - name: redis-data
          persistentVolumeClaim:
            claimName: romm-redis-data

---
# MariaDB for RomM
apiVersion: apps/v1
kind: Deployment
metadata:
  name: romm-mariadb
  namespace: romm
  labels:
    app: romm-mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: romm-mariadb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: romm-mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          env:
            - name: MYSQL_DATABASE
              value: romm
            - name: MYSQL_USER
              value: romm
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: dbPassword
            - name: MYSQL_RANDOM_ROOT_PASSWORD
              value: "yes"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: romm-mariadb-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-assets
  namespace: romm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-config
  namespace: romm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi

---
# Cover art, screenshots, metadata images — THE critical PVC most K8s deploys miss
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-resources
  namespace: romm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi

---
# Valkey/Redis task queue cache
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-redis-data
  namespace: romm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-mariadb-data
  namespace: romm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: romm
  namespace: romm
spec:
  selector:
    app: romm
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: romm-mariadb
  namespace: romm
spec:
  selector:
    app: romm-mariadb
  ports:
    - port: 3306
  clusterIP: None

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: romm
  namespace: romm
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: romm-tls
      hosts:
        - romm.daviddelporte.com
  rules:
    - host: romm.daviddelporte.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: romm
                port:
                  number: 8080
