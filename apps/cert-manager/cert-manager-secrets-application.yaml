---
# ---------------------------------------------------------------------------
# cert-manager-secrets — Cloudflare API token for DNS-01 challenges
#
# The cloudflare-api-token secret is deployed manually (no sops CMP plugin):
#   SOPS_AGE_KEY_FILE="/c/Users/DavidD/.config/sops/age/keys.txt" \
#     /c/Users/DavidD/AppData/Local/Temp/sops.exe --decrypt \
#     apps/cert-manager/manifests/secret.yaml | kubectl apply -n cert-manager -f -
#
# This Application exists as a marker so the App-of-Apps knows the secret
# is intentionally managed out-of-band. It has no source to sync.
#
# IMPORTANT: Run the manual apply command above after any cluster rebuild,
# or cert-manager DNS-01 challenges will fail (certs won't issue).
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"  # before ClusterIssuers (-1)
spec:
  project: default

  source:
    repoURL: https://github.com/Yasuke2000/Homelab.git
    targetRevision: master
    path: apps/cert-manager/manifests
    directory:
      exclude: "*"  # exclude everything — secret is deployed manually

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
