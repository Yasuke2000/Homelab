---
# ---------------------------------------------------------------------------
# Let's Encrypt ClusterIssuers — DNS-01 via Cloudflare
#
# DNS-01 voordelen t.o.v. HTTP-01:
#   - Geen port forwarding nodig (poort 80/443 hoeft niet open)
#   - Ondersteunt wildcard certs (*.daviddelporte.com)
#   - Werkt voor interne services die niet publiek bereikbaar zijn
#
# Vereiste: Cloudflare API token als K8s Secret in cert-manager namespace.
# Aanmaken via scripts/create-k8s-secrets.sh (na secrets/secrets.yaml invullen)
#
# Staging issuer: testen zonder LE rate limits te raken
# Prod issuer:    pas gebruiken NA verificatie met staging
# ---------------------------------------------------------------------------

# Staging — voor testen (niet vertrouwd door browsers)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: david@daviddelporte.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token

---
# Productie — vertrouwd door browsers (rate-limit: 5 certs/domein/week)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: david@daviddelporte.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
