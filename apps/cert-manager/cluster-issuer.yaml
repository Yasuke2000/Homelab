---
# ---------------------------------------------------------------------------
# Let's Encrypt ClusterIssuers
#
# Staging issuer: test without hitting LE rate limits
# Prod issuer:    use in production once staging works
#
# TODO: replace email with your actual email address
# ---------------------------------------------------------------------------

# Staging — for testing (not trusted by browsers)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # TODO: replace with your email
    email: you@yourdomain.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik

---
# Production — trusted by browsers (rate-limited: 5 certs/domain/week)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # TODO: replace with your email
    email: you@yourdomain.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
