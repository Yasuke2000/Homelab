---
# ---------------------------------------------------------------------------
# cert-manager v1.20 — automatic TLS via Let's Encrypt
#
# Uses HTTP-01 challenge (Traefik proxies the challenge).
# For wildcard certs: switch to DNS-01 challenge and add your DNS provider.
#
# TODO: verify chart version — https://artifacthub.io/packages/helm/cert-manager/cert-manager
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"  # after Traefik, before apps need TLS
spec:
  project: default

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: "v1.20.0"
    helm:
      valuesObject:
        # Install CRDs via Helm (recommended for GitOps)
        crds:
          enabled: true

        # Prometheus metrics
        prometheus:
          enabled: true
          servicemonitor:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - Replace=true  # needed for CRD upgrades
