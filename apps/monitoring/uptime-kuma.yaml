---
# ---------------------------------------------------------------------------
# Uptime Kuma — uptime monitoring with status page
# Separate from kube-prometheus-stack — different namespace same ArgoCD app
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Yasuke2000/Homelab.git
    targetRevision: HEAD
    path: apps/monitoring/uptime-kuma-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
