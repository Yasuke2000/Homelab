apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-homelab-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  homelab-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Cluster Health",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 3 }] } } },
          "gridPos": { "h": 3, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": { "colorMode": "background_solid", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "value", "justifyMode": "center" },
          "title": "Nodes Ready",
          "type": "stat",
          "targets": [{ "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } } },
          "gridPos": { "h": 3, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": { "colorMode": "background_solid", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "value", "justifyMode": "center" },
          "title": "Pods Not Running",
          "type": "stat",
          "targets": [{ "expr": "count(kube_pod_status_phase{phase!~\"Running|Succeeded\"} == 1) or vector(0)" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }, { "color": "red", "value": 5 }] } } },
          "gridPos": { "h": 3, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": { "colorMode": "background_solid", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "value", "justifyMode": "center" },
          "title": "Pod Restarts (1h)",
          "type": "stat",
          "targets": [{ "expr": "sum(increase(kube_pod_container_status_restarts_total[1h])) or vector(0)" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }] } } },
          "gridPos": { "h": 3, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": { "colorMode": "background_solid", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "value", "justifyMode": "center" },
          "title": "Running Pods",
          "type": "stat",
          "targets": [{ "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "unit": "dtdurations", "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 86400 }, { "color": "green", "value": 604800 }] } } },
          "gridPos": { "h": 3, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": { "colorMode": "background_solid", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "value", "justifyMode": "center" },
          "title": "Cluster Uptime",
          "type": "stat",
          "targets": [{ "expr": "min(time() - kube_node_created)" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } } },
          "gridPos": { "h": 3, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": { "colorMode": "background_solid", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "value", "justifyMode": "center" },
          "title": "Firing Alerts",
          "type": "stat",
          "targets": [{ "expr": "count(ALERTS{alertstate=\"firing\",alertname!=\"Watchdog\"}) or vector(0)" }]
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 4 },
          "id": 200,
          "title": "Node 1 — etcd leader (10.0.20.11)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } },
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 5 },
          "id": 10,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "CPU",
          "type": "gauge",
          "targets": [{ "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\",instance=\"10.0.20.11:9100\"}[5m]))) * 100", "legendFormat": "Node 1" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } },
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 5 },
          "id": 11,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Memory",
          "type": "gauge",
          "targets": [{ "expr": "(1 - (node_memory_MemAvailable_bytes{instance=\"10.0.20.11:9100\"} / node_memory_MemTotal_bytes{instance=\"10.0.20.11:9100\"})) * 100", "legendFormat": "Node 1" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } },
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 5 },
          "id": 12,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Disk",
          "type": "gauge",
          "targets": [{ "expr": "(1 - (node_filesystem_avail_bytes{instance=\"10.0.20.11:9100\",mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{instance=\"10.0.20.11:9100\",mountpoint=\"/\",fstype!=\"tmpfs\"})) * 100", "legendFormat": "Node 1" }]
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 10 },
          "id": 201,
          "title": "Node 2 — server join (10.0.20.12)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } },
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 11 },
          "id": 13,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "CPU",
          "type": "gauge",
          "targets": [{ "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\",instance=\"10.0.20.12:9100\"}[5m]))) * 100", "legendFormat": "Node 2" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } },
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 11 },
          "id": 14,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Memory",
          "type": "gauge",
          "targets": [{ "expr": "(1 - (node_memory_MemAvailable_bytes{instance=\"10.0.20.12:9100\"} / node_memory_MemTotal_bytes{instance=\"10.0.20.12:9100\"})) * 100", "legendFormat": "Node 2" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } },
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 11 },
          "id": 15,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Disk",
          "type": "gauge",
          "targets": [{ "expr": "(1 - (node_filesystem_avail_bytes{instance=\"10.0.20.12:9100\",mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{instance=\"10.0.20.12:9100\",mountpoint=\"/\",fstype!=\"tmpfs\"})) * 100", "legendFormat": "Node 2" }]
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "id": 202,
          "title": "Node 3 — server join (10.0.20.13)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } },
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 17 },
          "id": 16,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "CPU",
          "type": "gauge",
          "targets": [{ "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\",instance=\"10.0.20.13:9100\"}[5m]))) * 100", "legendFormat": "Node 3" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } },
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 17 },
          "id": 17,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Memory",
          "type": "gauge",
          "targets": [{ "expr": "(1 - (node_memory_MemAvailable_bytes{instance=\"10.0.20.13:9100\"} / node_memory_MemTotal_bytes{instance=\"10.0.20.13:9100\"})) * 100", "legendFormat": "Node 3" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } } },
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 17 },
          "id": 18,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Disk",
          "type": "gauge",
          "targets": [{ "expr": "(1 - (node_filesystem_avail_bytes{instance=\"10.0.20.13:9100\",mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{instance=\"10.0.20.13:9100\",mountpoint=\"/\",fstype!=\"tmpfs\"})) * 100", "legendFormat": "Node 3" }]
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 22 },
          "id": 102,
          "title": "Resource Trends",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "percent", "max": 100, "min": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 23 },
          "id": 20,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "title": "CPU Usage Over Time",
          "type": "timeseries",
          "targets": [
            { "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\",instance=\"10.0.20.11:9100\"}[5m]))) * 100", "legendFormat": "Node 1 (10.0.20.11)" },
            { "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\",instance=\"10.0.20.12:9100\"}[5m]))) * 100", "legendFormat": "Node 2 (10.0.20.12)" },
            { "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\",instance=\"10.0.20.13:9100\"}[5m]))) * 100", "legendFormat": "Node 3 (10.0.20.13)" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never", "spanNulls": true },
              "unit": "percent", "max": 100, "min": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 23 },
          "id": 21,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "title": "Memory Usage Over Time",
          "type": "timeseries",
          "targets": [
            { "expr": "(1 - (node_memory_MemAvailable_bytes{instance=\"10.0.20.11:9100\"} / node_memory_MemTotal_bytes{instance=\"10.0.20.11:9100\"})) * 100", "legendFormat": "Node 1 (10.0.20.11)" },
            { "expr": "(1 - (node_memory_MemAvailable_bytes{instance=\"10.0.20.12:9100\"} / node_memory_MemTotal_bytes{instance=\"10.0.20.12:9100\"})) * 100", "legendFormat": "Node 2 (10.0.20.12)" },
            { "expr": "(1 - (node_memory_MemAvailable_bytes{instance=\"10.0.20.13:9100\"} / node_memory_MemTotal_bytes{instance=\"10.0.20.13:9100\"})) * 100", "legendFormat": "Node 3 (10.0.20.13)" }
          ]
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 31 },
          "id": 103,
          "title": "Network & Disk I/O",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never", "spanNulls": true }, "unit": "Bps" } },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 32 },
          "id": 30,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "title": "Network Receive",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(rate(node_network_receive_bytes_total{instance=\"10.0.20.11:9100\",device!~\"lo|veth.*|cali.*|flannel.*|cni.*\"}[5m]))", "legendFormat": "Node 1" },
            { "expr": "sum(rate(node_network_receive_bytes_total{instance=\"10.0.20.12:9100\",device!~\"lo|veth.*|cali.*|flannel.*|cni.*\"}[5m]))", "legendFormat": "Node 2" },
            { "expr": "sum(rate(node_network_receive_bytes_total{instance=\"10.0.20.13:9100\",device!~\"lo|veth.*|cali.*|flannel.*|cni.*\"}[5m]))", "legendFormat": "Node 3" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never", "spanNulls": true }, "unit": "Bps" } },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 32 },
          "id": 31,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "title": "Disk I/O",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(rate(node_disk_read_bytes_total{instance=\"10.0.20.11:9100\"}[5m]))", "legendFormat": "Node 1 read" },
            { "expr": "sum(rate(node_disk_written_bytes_total{instance=\"10.0.20.11:9100\"}[5m]))", "legendFormat": "Node 1 write" },
            { "expr": "sum(rate(node_disk_read_bytes_total{instance=\"10.0.20.12:9100\"}[5m]))", "legendFormat": "Node 2 read" },
            { "expr": "sum(rate(node_disk_written_bytes_total{instance=\"10.0.20.12:9100\"}[5m]))", "legendFormat": "Node 2 write" },
            { "expr": "sum(rate(node_disk_read_bytes_total{instance=\"10.0.20.13:9100\"}[5m]))", "legendFormat": "Node 3 read" },
            { "expr": "sum(rate(node_disk_written_bytes_total{instance=\"10.0.20.13:9100\"}[5m]))", "legendFormat": "Node 3 write" }
          ]
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 39 },
          "id": 104,
          "title": "Longhorn Storage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "max": 100, "min": 0, "unit": "percent", "decimals": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 85 }] } } },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 40 },
          "id": 40,
          "options": { "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Longhorn Disk Usage",
          "type": "gauge",
          "targets": [
            { "expr": "(longhorn_node_storage_usage_bytes{node=\"homelab-node1\"} / longhorn_node_storage_capacity_bytes{node=\"homelab-node1\"}) * 100", "legendFormat": "Node 1" },
            { "expr": "(longhorn_node_storage_usage_bytes{node=\"homelab-node2\"} / longhorn_node_storage_capacity_bytes{node=\"homelab-node2\"}) * 100", "legendFormat": "Node 2" },
            { "expr": "(longhorn_node_storage_usage_bytes{node=\"homelab-node3\"} / longhorn_node_storage_capacity_bytes{node=\"homelab-node3\"}) * 100", "legendFormat": "Node 3" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "unit": "bytes", "thresholds": { "steps": [{ "color": "green", "value": null }] } } },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 40 },
          "id": 41,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto", "justifyMode": "center" },
          "title": "Longhorn Capacity",
          "type": "stat",
          "targets": [
            { "expr": "sum(longhorn_node_storage_capacity_bytes)", "legendFormat": "Total" },
            { "expr": "sum(longhorn_node_storage_usage_bytes)", "legendFormat": "Used" },
            { "expr": "sum(longhorn_node_storage_capacity_bytes) - sum(longhorn_node_storage_usage_bytes)", "legendFormat": "Free" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }] } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Degraded" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Faulted" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 40 },
          "id": 42,
          "options": { "colorMode": "background_solid", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto", "justifyMode": "center" },
          "title": "Longhorn Volumes",
          "type": "stat",
          "targets": [
            { "expr": "count(longhorn_volume_robustness{state=\"healthy\"} == 1) or vector(0)", "legendFormat": "Healthy" },
            { "expr": "count(longhorn_volume_robustness{state=\"degraded\"} == 1) or vector(0)", "legendFormat": "Degraded" },
            { "expr": "count(longhorn_volume_robustness{state=\"faulted\"} == 1) or vector(0)", "legendFormat": "Faulted" }
          ]
        },

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 46 },
          "id": 105,
          "title": "Top Resource Consumers",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" }, "unit": "bytes",
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 536870912 }, { "color": "red", "value": 1073741824 }] },
