apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-homelab-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  homelab-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Cluster Health",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Nodes Ready",
          "type": "stat",
          "targets": [{ "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Pods Not Running",
          "type": "stat",
          "targets": [{ "expr": "count(kube_pod_status_phase{phase!~\"Running|Succeeded\"} == 1) or vector(0)" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }, { "color": "red", "value": 5 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Pod Restarts (1h)",
          "type": "stat",
          "targets": [{ "expr": "sum(increase(kube_pod_container_status_restarts_total[1h])) or vector(0)" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Running Pods",
          "type": "stat",
          "targets": [{ "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "dtdurations",
              "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 86400 }, { "color": "green", "value": 604800 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Cluster Uptime",
          "type": "stat",
          "targets": [{ "expr": "min(time() - kube_node_created)" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Firing Alerts",
          "type": "stat",
          "targets": [{ "expr": "count(ALERTS{alertstate=\"firing\",alertname!=\"Watchdog\"}) or vector(0)" }]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Node Resources — Per Node",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-GrYlRd" },
              "max": 100, "min": 0, "unit": "percent",
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] }
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 6 },
          "id": 10,
          "options": { "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true, "minVizHeight": 75 },
          "title": "CPU Usage per Node",
          "type": "gauge",
          "targets": [{
            "expr": "label_replace((1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) by (instance)) * 100, \"node\", \"$1\", \"instance\", \"(.*):.*\")",
            "legendFormat": "{{ node }}"
          }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-GrYlRd" },
              "max": 100, "min": 0, "unit": "percent",
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] }
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 6 },
          "id": 11,
          "options": { "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true, "minVizHeight": 75 },
          "title": "Memory Usage per Node",
          "type": "gauge",
          "targets": [{
            "expr": "label_replace((1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100, \"node\", \"$1\", \"instance\", \"(.*):.*\")",
            "legendFormat": "{{ node }}"
          }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-GrYlRd" },
              "max": 100, "min": 0, "unit": "percent",
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] }
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 6 },
          "id": 12,
          "options": { "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true, "minVizHeight": 75 },
          "title": "Disk Usage per Node",
          "type": "gauge",
          "targets": [{
            "expr": "label_replace((1 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"})) * 100, \"node\", \"$1\", \"instance\", \"(.*):.*\")",
            "legendFormat": "{{ node }}"
          }]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "Resource Trends (all nodes)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" },
              "unit": "percent", "max": 100, "min": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 20,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] }, "tooltip": { "mode": "multi" } },
          "title": "CPU Usage Over Time",
          "type": "timeseries",
          "targets": [{
            "expr": "label_replace((1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) by (instance)) * 100, \"node\", \"$1\", \"instance\", \"(.*):.*\")",
            "legendFormat": "{{ node }}"
          }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" },
              "unit": "percent", "max": 100, "min": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 21,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] }, "tooltip": { "mode": "multi" } },
          "title": "Memory Usage Over Time",
          "type": "timeseries",
          "targets": [{
            "expr": "label_replace((1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100, \"node\", \"$1\", \"instance\", \"(.*):.*\")",
            "legendFormat": "{{ node }}"
          }]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "title": "Network & Storage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" },
              "unit": "Bps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "id": 30,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "title": "Network Traffic (Receive)",
          "type": "timeseries",
          "targets": [{
            "expr": "label_replace(sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*|cni.*\"}[5m])) by (instance), \"node\", \"$1\", \"instance\", \"(.*):.*\")",
            "legendFormat": "{{ node }}"
          }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" },
              "unit": "Bps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "id": 31,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "title": "Disk I/O",
          "type": "timeseries",
          "targets": [
            {
              "expr": "label_replace(sum(rate(node_disk_read_bytes_total[5m])) by (instance), \"node\", \"$1\", \"instance\", \"(.*):.*\")",
              "legendFormat": "{{ node }} read"
            },
            {
              "expr": "label_replace(sum(rate(node_disk_written_bytes_total[5m])) by (instance), \"node\", \"$1\", \"instance\", \"(.*):.*\")",
              "legendFormat": "{{ node }} write"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
          "id": 104,
          "title": "Longhorn Storage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-GrYlRd" },
              "max": 100, "min": 0, "unit": "percent",
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 85 }] }
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 33 },
          "id": 40,
          "options": { "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Longhorn Node Disk Usage",
          "type": "gauge",
          "targets": [{ "expr": "(longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes) * 100", "legendFormat": "{{ node }}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "bytes",
              "thresholds": { "steps": [{ "color": "green", "value": null }] }
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 33 },
          "id": 41,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Longhorn Capacity",
          "type": "stat",
          "targets": [
            { "expr": "sum(longhorn_node_storage_capacity_bytes)", "legendFormat": "Total" },
            { "expr": "sum(longhorn_node_storage_usage_bytes)", "legendFormat": "Used" },
            { "expr": "sum(longhorn_node_storage_capacity_bytes) - sum(longhorn_node_storage_usage_bytes)", "legendFormat": "Free" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }] }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Degraded" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Faulted" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 33 },
          "id": 42,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] }, "textMode": "auto" },
          "title": "Longhorn Volumes",
          "type": "stat",
          "targets": [
            { "expr": "count(longhorn_volume_robustness == 0) or vector(0)", "legendFormat": "Healthy" },
            { "expr": "count(longhorn_volume_robustness == 1) or vector(0)", "legendFormat": "Degraded" },
            { "expr": "count(longhorn_volume_robustness == 2) or vector(0)", "legendFormat": "Faulted" }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 39 },
          "id": 105,
          "title": "Top Resource Consumers",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "bytes",
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 536870912 }, { "color": "red", "value": 1073741824 }] },
              "custom": { "align": "auto", "cellOptions": { "type": "auto" }, "inspect": false }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Memory" }, "properties": [{ "id": "custom.cellOptions", "value": { "mode": "gradient", "type": "color-background" } }] }
            ]
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 40 },
          "id": 50,
          "options": { "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Memory" }] },
          "title": "Top 15 Pods by Memory",
          "type": "table",
          "targets": [{
            "expr": "topk(15, sum by (namespace, pod) (container_memory_working_set_bytes{container!=\"\", container!=\"POD\"}))",
            "format": "table",
            "instant": true
          }],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true }, "renameByName": { "namespace": "Namespace", "pod": "Pod", "Value": "Memory" } } }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 3 }, { "color": "red", "value": 10 }] },
              "custom": { "align": "auto", "cellOptions": { "type": "auto" }, "inspect": false }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Restarts" }, "properties": [{ "id": "custom.cellOptions", "value": { "mode": "gradient", "type": "color-background" } }] }
            ]
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 40 },
          "id": 51,
          "options": { "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Restarts" }] },
          "title": "Pod Restarts (24h)",
          "type": "table",
          "targets": [{
            "expr": "sort_desc(sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[24h])) > 0)",
            "format": "table",
            "instant": true
          }],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true }, "renameByName": { "namespace": "Namespace", "pod": "Pod", "Value": "Restarts" } } }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 50 },
          "id": 106,
          "title": "Ingress Traffic",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 30, "lineWidth": 2, "showPoints": "never", "stacking": { "mode": "normal" } },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 51 },
          "id": 60,
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "title": "Traefik Requests per Service",
          "type": "timeseries",
          "targets": [{ "expr": "sum(rate(traefik_service_requests_total[5m])) by (service)", "legendFormat": "{{ service }}" }]
        }
      ],
      "schemaVersion": 39,
      "tags": ["homelab", "overview"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "Europe/Brussels",
      "title": "Homelab Overview",
      "uid": "homelab-overview",
      "version": 2
    }
