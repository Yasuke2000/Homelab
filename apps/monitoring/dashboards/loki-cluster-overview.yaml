---
# ---------------------------------------------------------------------------
# Loki: Cluster Logs Overview
# High-level log rates, error detection, recent errors across all namespaces
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-loki-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  loki-cluster-overview.json: |
    {
      "id": null,
      "uid": "homelab-loki-overview",
      "title": "Loki: Cluster Logs Overview",
      "description": "Log rates, error detection and recent issues across all namespaces",
      "tags": ["loki", "logs", "homelab"],
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 39,
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Total Log Rate",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "displayName": "logs/s",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [
            {
              "expr": "sum(rate({namespace=~\".+\"}[$__interval]))",
              "legendFormat": "logs/s",
              "refId": "A",
              "queryType": "instant",
              "datasource": { "type": "loki", "uid": "loki" }
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "displayName": "errors/s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate({namespace=~\".+\"} |~ \"(?i)(error|exception|fatal|panic)\" [$__interval]))",
              "legendFormat": "errors/s",
              "refId": "A",
              "queryType": "instant",
              "datasource": { "type": "loki", "uid": "loki" }
            }
          ]
        },
        {
          "id": 3,
          "title": "Warning Rate",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "displayName": "warns/s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.05 },
                  { "color": "orange", "value": 0.5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate({namespace=~\".+\"} |~ \"(?i)(^warn|\\bwarning\\b)\" [$__interval]))",
              "legendFormat": "warns/s",
              "refId": "A",
              "queryType": "instant",
              "datasource": { "type": "loki", "uid": "loki" }
            }
          ]
        },
        {
          "id": 4,
          "title": "Active Namespaces",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [
            {
              "expr": "count(count by(namespace) (rate({namespace=~\".+\"}[5m])))",
              "legendFormat": "namespaces",
              "refId": "A",
              "queryType": "instant",
              "datasource": { "type": "loki", "uid": "loki" }
            }
          ]
        },
        {
          "id": 5,
          "title": "Log Rate by Namespace",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 1, "fillOpacity": 8 }
            }
          },
          "targets": [
            {
              "expr": "sum by(namespace) (rate({namespace=~\".+\"}[$__interval]))",
              "legendFormat": "{{namespace}}",
              "refId": "A",
              "queryType": "range",
              "datasource": { "type": "loki", "uid": "loki" }
            }
          ]
        },
        {
          "id": 6,
          "title": "Error Rate by Namespace",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 16, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2, "fillOpacity": 15 }
            }
          },
          "targets": [
            {
              "expr": "sum by(namespace) (rate({namespace=~\".+\"} |~ \"(?i)(error|exception|fatal|panic)\" [$__interval]))",
              "legendFormat": "{{namespace}}",
              "refId": "A",
              "queryType": "range",
              "datasource": { "type": "loki", "uid": "loki" }
            }
          ]
        },
        {
          "id": 7,
          "title": "Errors in Selected Window",
          "type": "bargauge",
          "gridPos": { "x": 16, "y": 12, "w": 8, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["sum"] },
            "displayMode": "gradient"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 25 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum by(namespace) (count_over_time({namespace=~\".+\"} |~ \"(?i)(error|exception|fatal|panic)\" [$__range]))",
              "legendFormat": "{{namespace}}",
              "refId": "A",
              "queryType": "instant",
              "datasource": { "type": "loki", "uid": "loki" }
            }
          ]
        },
        {
          "id": 8,
          "title": "Recent Errors & Fatal Logs",
          "type": "logs",
          "gridPos": { "x": 0, "y": 20, "w": 24, "h": 14 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          },
          "targets": [
            {
              "expr": "{namespace=~\".+\"} |~ \"(?i)(error|exception|fatal|panic|crit)\"",
              "legendFormat": "",
              "refId": "A",
              "maxLines": 500,
              "datasource": { "type": "loki", "uid": "loki" }
            }
          ]
        }
      ]
    }
