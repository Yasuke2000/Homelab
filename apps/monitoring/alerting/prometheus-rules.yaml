---
# ---------------------------------------------------------------------------
# PrometheusRule — core cluster alerting rules
#
# Covers: Node health, K8s workloads, etcd, Longhorn, cert-manager,
#         CronJob monitoring, Apprise/notification health
#
# Receiver: Discord via Apprise → apprise-webhook bridge
# ---------------------------------------------------------------------------

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:

    # -----------------------------------------------------------------------
    # Node health — catch problems BEFORE they cause outages
    # -----------------------------------------------------------------------
    - name: node.health
      rules:
        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} is unreachable"

        - alert: NodeMemoryWarning
          expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} memory < 15% free"
            description: "Available: {{ $value | humanizePercentage }}. Investigate top consumers."

        - alert: NodeMemoryCritical
          expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.07
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} memory < 7% free — OOM risk"
            description: "Available: {{ $value | humanizePercentage }}. Pods will be evicted soon."

        - alert: NodeHighCPU
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} CPU > 90% for 15 min"

        - alert: NodeDiskSpaceLow
          expr: |
            (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
            / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} root disk < 15% free"
            description: "Available: {{ $value | humanizePercentage }}"

        - alert: NodeDiskSpaceCritical
          expr: |
            (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
            / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) < 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} root disk < 5% free"
            description: "Available: {{ $value | humanizePercentage }}"

        # Predict disk full in 24h based on current growth rate
        - alert: NodeDiskFillingUp
          expr: |
            predict_linear(node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}[6h], 24*3600) < 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} disk predicted full within 24h"
            description: "Based on 6h growth trend. Current free: {{ with printf `node_filesystem_avail_bytes{instance=\"%s\",mountpoint=\"/\",fstype!=\"tmpfs\"}` $labels.instance | query }}{{ . | first | value | humanize1024 }}{{ end }}"

        - alert: NodeHighLoadAverage
          expr: node_load15 / count without(cpu, mode) (node_cpu_seconds_total{mode="idle"}) > 2
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} load average > 2x CPU cores for 15 min"

    # -----------------------------------------------------------------------
    # Kubernetes workloads
    # -----------------------------------------------------------------------
    - name: k8s.workloads
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }}: {{ $value | humanize }} restarts/min"

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{condition="true"} == 0
            unless on(pod, namespace) kube_pod_status_phase{phase=~"Succeeded|Failed"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} not ready for 10 min"

        - alert: OOMKill
          expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} OOMKilled"

        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas != kube_deployment_status_available_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"

        - alert: StatefulSetReplicasMismatch
          expr: kube_statefulset_status_replicas_ready != kube_statefulset_status_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.statefulset }} has unavailable replicas"

        - alert: PVCAlmostFull
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} > 85% full"
            description: "Used: {{ $value | humanizePercentage }}"

        - alert: PVCCriticallyFull
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.95
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} > 95% full"

    # -----------------------------------------------------------------------
    # CronJob monitoring — catch failed backups
    # -----------------------------------------------------------------------
    - name: cronjobs
      rules:
        - alert: CronJobFailed
          expr: |
            kube_job_status_failed{namespace="db-backups"} > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Backup job {{ $labels.namespace }}/{{ $labels.job_name }} failed"

        - alert: CronJobNotRunRecently
          expr: |
            time() - kube_cronjob_status_last_successful_time{namespace="db-backups"} > 93600
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} hasn't succeeded in 26h"
            description: "Last success: {{ $value | humanizeDuration }} ago"

    # -----------------------------------------------------------------------
    # etcd health
    # -----------------------------------------------------------------------
    - name: etcd.health
      rules:
        - alert: EtcdNoLeader
          expr: etcd_server_has_leader == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "etcd on {{ $labels.instance }} has no leader"

        - alert: EtcdHighFsyncDuration
          expr: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])) > 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "etcd WAL fsync P99 > 500ms on {{ $labels.instance }}"

        - alert: EtcdDatabaseSizeLarge
          expr: etcd_mvcc_db_total_size_in_bytes > 500 * 1024 * 1024
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "etcd database > 500 MiB on {{ $labels.instance }}"
            description: "Current: {{ $value | humanize1024 }}. Consider compaction."

    # -----------------------------------------------------------------------
    # Longhorn storage
    # -----------------------------------------------------------------------
    - name: longhorn.health
      rules:
        - alert: LonghornVolumeUnhealthy
          expr: longhorn_volume_robustness{state="faulted"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.pvc }} ({{ $labels.pvc_namespace }}) is FAULTED"
            description: "Data loss risk. Check longhorn.daviddelporte.com immediately."

        - alert: LonghornVolumeAtRisk
          expr: longhorn_volume_robustness{state="degraded"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.pvc }} ({{ $labels.pvc_namespace }}) is degraded"
            description: "Missing replica. One more node failure = data loss."

        - alert: LonghornNodeStorageLow
          expr: (longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes) > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn storage on {{ $labels.node }} > 80% full"

        - alert: LonghornInstanceManagerHighMemory
          expr: |
            sum by (node) (
              container_memory_working_set_bytes{namespace="longhorn-system",container="longhorn-instance-manager"}
            ) > 1073741824
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn instance-manager on {{ $labels.node }} using > 1 GiB memory"
            description: "May indicate memory leak regression. Normal is <100 MiB."

    # -----------------------------------------------------------------------
    # cert-manager
    # -----------------------------------------------------------------------
    - name: certmanager.certs
      rules:
        - alert: CertificateExpiringIn14Days
          expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < 14 * 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Cert {{ $labels.namespace }}/{{ $labels.name }} expires in < 14 days"

        - alert: CertificateExpiringIn3Days
          expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < 3 * 24 * 3600
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Cert {{ $labels.namespace }}/{{ $labels.name }} expires in < 3 days"

        - alert: CertificateNotReady
          expr: certmanager_certificate_ready_status{condition="True"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Cert {{ $labels.namespace }}/{{ $labels.name }} is not ready"

    # -----------------------------------------------------------------------
    # Notification health — alert if alerting itself is broken
    # -----------------------------------------------------------------------
    - name: notifications
      rules:
        - alert: AppriseDown
          expr: up{job="apprise"} == 0 or absent(up{job="apprise"})
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Apprise notification service is down"
            description: "Discord alerts will not be delivered."
