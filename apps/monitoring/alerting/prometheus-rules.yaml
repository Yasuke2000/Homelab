---
# ---------------------------------------------------------------------------
# PrometheusRule — core cluster alerting rules
#
# Deployed alongside kube-prometheus-stack. Covers:
#   - Node health (disk, memory, CPU)
#   - K3s / etcd health
#   - Pod crash loops / OOMKills
#   - Longhorn volume health
#   - cert-manager certificate expiry
#
# Alertmanager routes are configured in the kube-prometheus-stack Helm values.
# Receiver: Discord via Apprise (apprise-webhook bridge → apps/monitoring/apprise/)
# ---------------------------------------------------------------------------

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack   # matches ServiceMonitor selector
spec:
  groups:

    # -----------------------------------------------------------------------
    # Node health
    # -----------------------------------------------------------------------
    - name: node.health
      rules:
        - alert: NodeDiskSpaceLow
          expr: |
            (
              node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
              / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}
            ) < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} root disk < 15% free"
            description: "Available: {{ $value | humanizePercentage }}"

        - alert: NodeDiskSpaceCritical
          expr: |
            (
              node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
              / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}
            ) < 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} root disk < 5% free"
            description: "Available: {{ $value | humanizePercentage }}"

        - alert: NodeVarDiskSpaceLow
          expr: |
            (
              node_filesystem_avail_bytes{mountpoint="/var",fstype!="tmpfs"}
              / node_filesystem_size_bytes{mountpoint="/var",fstype!="tmpfs"}
            ) < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} /var disk < 15% free (Longhorn data)"
            description: "Available: {{ $value | humanizePercentage }}"

        - alert: NodeMemoryWarning
          expr: |
            (
              node_memory_MemAvailable_bytes
              / node_memory_MemTotal_bytes
            ) < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} memory < 15% free"
            description: "Available: {{ $value | humanizePercentage }}"

        - alert: NodeMemoryCritical
          expr: |
            (
              node_memory_MemAvailable_bytes
              / node_memory_MemTotal_bytes
            ) < 0.07
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} memory < 7% free — OOM risk"
            description: "Available: {{ $value | humanizePercentage }}"

        - alert: NodeHighCPU
          expr: |
            100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} CPU > 90% for 15 min"

        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node exporter unreachable on {{ $labels.instance }}"

    # -----------------------------------------------------------------------
    # Kubernetes workload health
    # -----------------------------------------------------------------------
    - name: k8s.workloads
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) * 60 > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} restarts: {{ $value | humanize }} per minute"

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{condition="true"} == 0
            unless on(pod, namespace)
              kube_pod_status_phase{phase=~"Succeeded|Failed"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready for 10 min"

        - alert: OOMKill
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} OOMKilled"

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas != kube_deployment_status_available_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"
            description: "Desired: {{ $labels.spec_replicas }}, available: {{ $value }}"

        - alert: PVCAlmostFull
          expr: |
            (
              kubelet_volume_stats_used_bytes
              / kubelet_volume_stats_capacity_bytes
            ) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} > 85% full"
            description: "Used: {{ $value | humanizePercentage }}"

    # -----------------------------------------------------------------------
    # etcd / K3s cluster health
    # -----------------------------------------------------------------------
    - name: etcd.health
      rules:
        - alert: EtcdNoLeader
          expr: etcd_server_has_leader == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "etcd on {{ $labels.instance }} has no leader — cluster may be down"

        - alert: EtcdHighFsyncDuration
          expr: |
            histogram_quantile(0.99,
              rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])
            ) > 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "etcd WAL fsync P99 > 500ms on {{ $labels.instance }}"
            description: "Slow disk I/O can cause leader elections"

    # -----------------------------------------------------------------------
    # Longhorn storage health
    # -----------------------------------------------------------------------
    - name: longhorn.health
      rules:
        - alert: LonghornVolumeUnhealthy
          expr: longhorn_volume_robustness{state="faulted"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is faulted"
            description: "Check Longhorn UI at longhorn.daviddelporte.com"

        - alert: LonghornVolumeAtRisk
          expr: longhorn_volume_robustness{state="degraded"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is degraded (missing replica)"

        - alert: LonghornNodeStorageLow
          expr: |
            (
              longhorn_node_storage_usage_bytes
              / longhorn_node_storage_capacity_bytes
            ) > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn storage on {{ $labels.node }} > 80% full"

    # -----------------------------------------------------------------------
    # cert-manager — certificate expiry
    # -----------------------------------------------------------------------
    - name: certmanager.certs
      rules:
        - alert: CertificateExpiringIn14Days
          expr: |
            certmanager_certificate_expiration_timestamp_seconds
            - time() < 14 * 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in < 14 days"

        - alert: CertificateExpiringIn3Days
          expr: |
            certmanager_certificate_expiration_timestamp_seconds
            - time() < 3 * 24 * 3600
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in < 3 days"

        - alert: CertificateNotReady
          expr: certmanager_certificate_ready_status{condition="True"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} is not ready"
