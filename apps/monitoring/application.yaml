---
# ---------------------------------------------------------------------------
# kube-prometheus-stack — Prometheus + Grafana + Alertmanager
#
# Includes: prometheus-operator, node-exporter, kube-state-metrics, grafana
# TODO: verify chart version — https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # TODO: pin to latest stable version
    targetRevision: "70.4.2"
    helm:
      valuesObject:
        # Grafana
        grafana:
          enabled: true
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              cert-manager.io/cluster-issuer: letsencrypt-staging
            hosts:
              - grafana.daviddelporte.com   # TODO
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.daviddelporte.com  # TODO

          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: admin-password

          persistence:
            enabled: true
            storageClassName: longhorn
            size: 5Gi

        # Prometheus
        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 20Gi

            # Scrape all ServiceMonitors in the cluster
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false

        # Alertmanager
        alertmanager:
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'discord'
              routes:
                - receiver: 'discord'
                  matchers:
                    - severity =~ "critical|warning"
            receivers:
              # TODO: deploy alertmanager-discord bridge before first boot
              # See docs/alerting.md for setup instructions
              - name: 'discord'
                webhook_configs:
                  - url: 'http://alertmanager-discord.monitoring.svc.cluster.local:9094'
                    send_resolved: true
            templates: []
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 2Gi

        # node-exporter on all nodes (including control-plane)
        prometheus-node-exporter:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists

        # kube-state-metrics
        kube-state-metrics:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - Replace=true  # for CRD upgrades
