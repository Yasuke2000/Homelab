---
# ---------------------------------------------------------------------------
# kube-prometheus-stack — Prometheus + Grafana + Alertmanager
#
# Includes: prometheus-operator, node-exporter, kube-state-metrics, grafana
# TODO: verify chart version — https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # TODO: pin to latest stable version
    targetRevision: "70.4.2"
    helm:
      valuesObject:
        # Use cert-manager for admission webhook TLS (eliminates pre-sync hook RBAC jobs)
        # Pre-sync certgen jobs conflict on ArgoCD retries — cert-manager avoids this entirely
        prometheusOperator:
          admissionWebhooks:
            certManager:
              enabled: true
            patch:
              enabled: false

        # Grafana
        grafana:
          enabled: true
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - grafana.daviddelporte.com
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.daviddelporte.com

          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: admin-password

          persistence:
            enabled: true
            storageClassName: longhorn
            size: 5Gi

          additionalDataSources:
            - name: Loki
              type: loki
              uid: loki
              access: proxy
              url: http://loki.logging.svc.cluster.local:3100
              isDefault: false
              jsonData:
                maxLines: 1000

        # Prometheus
        prometheus:
          prometheusSpec:
            retention: 14d
            scrapeInterval: 30s
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 20Gi

            # Scrape all ServiceMonitors in the cluster
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false

        # Alertmanager
        alertmanager:
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'discord'
              routes:
                - receiver: 'discord'
                  matchers:
                    - severity =~ "critical|warning"
            receivers:
              - name: 'discord'
                webhook_configs:
                  - url: 'http://apprise-webhook.monitoring.svc.cluster.local:3000?template=alertmanager&key=alerts'
                    send_resolved: true
            templates: []
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 2Gi

        # K3s bundles kube-proxy, scheduler, controller-manager inside the k3s binary.
        # They don't expose separate metrics endpoints → disable their ServiceMonitors
        # to avoid false-positive Down alerts.
        kubeProxy:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false

        # node-exporter on all nodes (including control-plane)
        prometheus-node-exporter:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists

        # kube-state-metrics
        kube-state-metrics:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
