---
# ---------------------------------------------------------------------------
# Apprise API — multi-platform notification gateway
# Receives Alertmanager webhooks via apprise-webhook bridge, sends to Discord.
#
# Architecture:
#   Alertmanager → apprise-webhook:3000 (bridge) → apprise:8000 → Discord
#
# To add more notification targets (ntfy, Telegram, email, etc.):
#   Just add URLs to the alerts.yml ConfigMap and commit. No code changes needed.
#
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Apprise notification config — edit this to add/remove notification targets
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: apprise-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: apprise
data:
  # APPRISE_STATEFUL_MODE=simple maps key "alerts" to /config/alerts.yml
  # ${DISCORD_WEBHOOK_URL} is substituted by the init container from the secret.
  alerts.yml: |
    version: 1
    urls:
      - ${DISCORD_WEBHOOK_URL}:
        - tag: discord, alerts
      # --- Add more targets below (no code changes needed) ---
      # - ntfy://ntfy.sh/homelab-alerts:
      #   - tag: ntfy, alerts
      # - tgram://BOT_TOKEN/CHAT_ID:
      #   - tag: telegram, alerts

---
# PVC for Apprise runtime state (config files persisted by Apprise itself)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apprise-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: apprise
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi

---
# Apprise API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apprise
  namespace: monitoring
  labels:
    app.kubernetes.io/name: apprise
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apprise
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apprise
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        # Seed alerts.yml from ConfigMap template, injecting Discord URL from secret.
        # ConfigMap is source of truth — always wins over any runtime edits.
        - name: seed-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - 'URL=$(cat /secrets/discord_webhook_url) && sed "s|\${DISCORD_WEBHOOK_URL}|$URL|g" /seed/alerts.yml > /config/alerts.yml && echo "alerts.yml seeded"'
          volumeMounts:
            - name: config-seed
              mountPath: /seed
            - name: config-persistent
              mountPath: /config
            - name: discord-secret
              mountPath: /secrets
              readOnly: true
      containers:
        - name: apprise
          image: caronc/apprise:v1.3.3
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: APPRISE_STATEFUL_MODE
              value: "simple"   # maps key "alerts" to /config/alerts.yml
            - name: APPRISE_WORKER_COUNT
              value: "1"
          ports:
            - containerPort: 8000
              name: http
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config-persistent
              mountPath: /config
            - name: plugin
              mountPath: /plugin
            - name: attach
              mountPath: /attach
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-persistent
          persistentVolumeClaim:
            claimName: apprise-data
        - name: config-seed
          configMap:
            name: apprise-config
        - name: discord-secret
          secret:
            secretName: apprise-discord-secret
        - name: plugin
          emptyDir: {}
        - name: attach
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory

---
apiVersion: v1
kind: Service
metadata:
  name: apprise
  namespace: monitoring
  labels:
    app.kubernetes.io/name: apprise
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: apprise
  ports:
    - name: http
      port: 8000
      targetPort: http

---
# ---------------------------------------------------------------------------
# apprise-webhook — Alertmanager → Apprise bridge
#
# Receives Alertmanager native webhook payload, reformats it,
# and forwards to Apprise's /notify/{KEY} endpoint.
#
# Alertmanager webhook_configs url:
#   http://apprise-webhook.monitoring.svc.cluster.local:3000?template=alertmanager&key=alerts
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apprise-webhook
  namespace: monitoring
  labels:
    app.kubernetes.io/name: apprise-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apprise-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apprise-webhook
    spec:
      containers:
        - name: apprise-webhook
          image: zzeneg/apprise-webhook@sha256:24240495fa94813abf7d7396a87b219d08e2465e27c5d99caf934221f0a4e9d5
          env:
            - name: APPRISE_URL
              value: "http://apprise.monitoring.svc.cluster.local:8000/notify"
            - name: APPRISE_KEY
              value: "alerts"
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: apprise-webhook
  namespace: monitoring
  labels:
    app.kubernetes.io/name: apprise-webhook
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: apprise-webhook
  ports:
    - name: http
      port: 3000
      targetPort: http

---
# Apprise Web UI — for testing notifications and viewing config
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apprise
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: apprise-tls
      hosts:
        - apprise.daviddelporte.com
  rules:
    - host: apprise.daviddelporte.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apprise
                port:
                  number: 8000
