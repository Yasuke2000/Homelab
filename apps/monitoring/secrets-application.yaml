---
# ---------------------------------------------------------------------------
# monitoring-secrets — placeholder Application
#
# grafana-admin-secret is deployed manually via kubectl (no sops CMP plugin):
#   wsl.exe -d Alpine -- sh -c "SOPS_AGE_KEY_FILE=... sops --decrypt \
#     apps/monitoring/manifests/secret.yaml" | kubectl apply -n monitoring -f -
#
# This Application exists as a marker so the App-of-Apps knows the secret
# is intentionally managed out-of-band. It has no source to sync.
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default

  source:
    repoURL: https://github.com/Yasuke2000/Homelab.git
    targetRevision: master
    path: apps/monitoring/manifests
    directory:
      exclude: "*"  # exclude everything — secret is deployed manually

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
