---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actual-budget
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Yasuke2000/Homelab.git
    targetRevision: master
    path: apps/actual-budget/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: actual-budget
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
