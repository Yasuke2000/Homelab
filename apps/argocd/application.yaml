---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: "7.8.0"
    helm:
      valuesObject:
        global:
          domain: argocd.daviddelporte.com

        server:
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              cert-manager.io/cluster-issuer: letsencrypt-staging
            hosts:
              - argocd.daviddelporte.com
            tls:
              - secretName: argocd-tls
                hosts:
                  - argocd.daviddelporte.com

        configs:
          params:
            server.insecure: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
    # automated sync disabled — bootstrapped manually via install.yaml
    # automated:
    #   prune: true
    #   selfHeal: true
