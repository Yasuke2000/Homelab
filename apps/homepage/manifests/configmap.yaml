---
# ---------------------------------------------------------------------------
# Homepage config — central command post for the homelab
# Docs: https://gethomepage.dev/configs/
# ---------------------------------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: David's Homelab
    theme: dark
    color: slate
    headerStyle: clean
    target: _blank
    useEqualHeights: true
    layout:
      Media & Gaming:
        tab: Apps
        style: row
        columns: 4
      Productivity:
        tab: Apps
        style: row
        columns: 4
      Infrastructure:
        tab: Systems
        style: row
        columns: 4
      Monitoring & Ops:
        tab: Systems
        style: row
        columns: 4

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "K3s Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - longhorn:
        expanded: true
        total: true
        labels: true
        nodes: true
        url: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
    - search:
        provider: duckduckgo
        target: _blank
    - openmeteo:
        label: Brugge
        latitude: 51.2093
        longitude: 3.2247
        timezone: Europe/Brussels
        units: metric
        cache: 5
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hourCycle: h23

  services.yaml: |
    - Media & Gaming:
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.daviddelporte.com
            description: Media server (movies, TV, music)
            namespace: media
            app: jellyfin

        - Seerr:
            icon: jellyseerr.png
            href: https://requests.daviddelporte.com
            description: Media requests
            namespace: media
            app: seerr

        - RomM:
            icon: mdi-controller-classic
            href: https://romm.daviddelporte.com
            description: ROM manager (693 ROMs, 25 platforms)
            namespace: romm
            app: romm
            widget:
              type: romm
              url: http://romm.romm.svc.cluster.local:8080

        - Pelican:
            icon: https://raw.githubusercontent.com/pelican-dev/panel/main/public/pelican.svg
            href: https://games.daviddelporte.com
            description: Game server panel
            namespace: pelican
            app: pelican-panel

    - Productivity:
        - Ghost:
            icon: ghost.png
            href: https://daviddelporte.com
            description: Website & blog
            namespace: ghost
            app: ghost

        - Vaultwarden:
            icon: bitwarden.png
            href: https://vault.daviddelporte.com
            description: Password manager
            namespace: vaultwarden
            app: vaultwarden

        - Jelu:
            icon: mdi-bookshelf
            href: https://jelu.daviddelporte.com
            description: Book library (ISBN scanner)
            namespace: jelu
            app: jelu

        - Actual Budget:
            icon: actual.png
            href: https://budget.daviddelporte.com
            description: Personal finance
            namespace: actual-budget
            app: actual-budget

    - Infrastructure:
        - ArgoCD:
            icon: argocd.png
            href: https://argocd.daviddelporte.com
            description: GitOps (30 apps)
            namespace: argocd
            app: argocd-server

        - Traefik:
            icon: traefik.png
            href: https://traefik.daviddelporte.com
            description: Ingress controller
            widget:
              type: traefik
              url: http://traefik.traefik.svc.cluster.local:9000

        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.daviddelporte.com
            description: Distributed storage (698 GiB)
            namespace: longhorn-system
            app: longhorn-frontend

        - Cloudflare Tunnel:
            icon: cloudflare.png
            href: https://one.dash.cloudflare.com
            description: External access

    - Monitoring & Ops:
        - Grafana:
            icon: grafana.png
            href: https://grafana.daviddelporte.com
            description: Metrics & dashboards
            namespace: monitoring
            app: kube-prometheus-stack-grafana

        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://status.daviddelporte.com
            description: Service uptime
            namespace: uptime-kuma
            app: uptime-kuma
            widget:
              type: uptimekuma
              url: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
              slug: homelab

        - CouchDB:
            icon: couchdb.png
            href: https://couchdb.daviddelporte.com/_utils
            description: Obsidian notes sync
            namespace: obsidian
            app: couchdb

        - NAS:
            icon: synology.png
            href: http://10.0.20.14:5000
            description: Synology DS918+

  bookmarks.yaml: |
    - Quick Links:
        - GitHub Repo:
            - icon: github.png
              href: https://github.com/Yasuke2000/Homelab
        - Cloudflare:
            - icon: cloudflare.png
              href: https://dash.cloudflare.com
        - Tailscale:
            - icon: tailscale.png
              href: https://login.tailscale.com/admin/machines
        - Synology NAS:
            - icon: synology.png
              href: http://10.0.20.14:5000

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""
  custom.css: ""
  custom.js: ""
