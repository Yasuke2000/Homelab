---
# ---------------------------------------------------------------------------
# Homepage config — central command post
# Note: Homepage v1.12+ defaults to app.kubernetes.io/name for pod matching.
# Use podSelector: "app=X" for pods that use the plain "app" label.
# ---------------------------------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: David's Homelab
    theme: dark
    color: slate
    headerStyle: clean
    target: _blank
    useEqualHeights: true
    layout:
      Media & Gaming:
        tab: Apps
        style: row
        columns: 4
      Productivity:
        tab: Apps
        style: row
        columns: 4
      Infrastructure:
        tab: Systems
        style: row
        columns: 4
      Monitoring & Ops:
        tab: Systems
        style: row
        columns: 4

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "K3s Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
    - openmeteo:
        label: Brugge
        latitude: 51.2093
        longitude: 3.2247
        timezone: Europe/Brussels
        units: metric
        cache: 5
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hourCycle: h23

  services.yaml: |
    - Media & Gaming:
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.daviddelporte.com
            description: Media server
            namespace: media
            app: jellyfin
            podSelector: "app=jellyfin"

        - Seerr:
            icon: overseerr.png
            href: https://requests.daviddelporte.com
            description: Media requests
            namespace: media
            app: seerr
            podSelector: "app=seerr"

        - RomM:
            icon: romm.png
            href: https://romm.daviddelporte.com
            description: ROM manager (652 ROMs)
            namespace: romm
            app: romm
            podSelector: "app=romm"
            widget:
              type: romm
              url: http://romm.romm.svc.cluster.local:8080

        - Pelican:
            icon: pterodactyl.png
            href: https://games.daviddelporte.com
            description: Game server panel
            namespace: pelican
            app: pelican-panel
            podSelector: "app=pelican-panel"

    - Productivity:
        - Ghost:
            icon: ghost.png
            href: https://daviddelporte.com
            description: Website & blog
            namespace: ghost
            app: ghost
            podSelector: "app=ghost"

        - Vaultwarden:
            icon: bitwarden.png
            href: https://vault.daviddelporte.com
            description: Password manager
            namespace: vaultwarden
            app: vaultwarden
            podSelector: "app=vaultwarden"

        - Jelu:
            icon: mdi-bookshelf
            href: https://jelu.daviddelporte.com
            description: Book library
            namespace: jelu
            app: jelu
            podSelector: "app=jelu"

        - Actual Budget:
            icon: actual-budget.png
            href: https://budget.daviddelporte.com
            description: Personal finance
            namespace: actual-budget
            app: actual-budget
            podSelector: "app=actual-budget"

    - Infrastructure:
        - ArgoCD:
            icon: argocd.png
            href: https://argocd.daviddelporte.com
            description: GitOps (30 apps)
            namespace: argocd
            app: argocd-server
            podSelector: "app.kubernetes.io/name=argocd-server"

        - Traefik:
            icon: traefik.png
            href: https://traefik.daviddelporte.com
            description: Ingress controller
            namespace: traefik
            app: traefik
            podSelector: "app.kubernetes.io/name=traefik"

        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.daviddelporte.com
            description: Storage (698 GiB)
            namespace: longhorn-system
            app: longhorn-ui
            podSelector: "app=longhorn-ui"

        - Cloudflare Tunnel:
            icon: cloudflare.png
            href: https://one.dash.cloudflare.com
            description: External access
            namespace: cloudflared
            app: cloudflared
            podSelector: "app=cloudflared"

    - Monitoring & Ops:
        - Grafana:
            icon: grafana.png
            href: https://grafana.daviddelporte.com
            description: Metrics & dashboards
            namespace: monitoring
            app: grafana
            podSelector: "app.kubernetes.io/name=grafana"

        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://status.daviddelporte.com
            description: Service uptime
            namespace: uptime-kuma
            app: uptime-kuma
            podSelector: "app=uptime-kuma"
            widget:
              type: uptimekuma
              url: http://uptime-kuma.uptime-kuma.svc.cluster.local:3001
              slug: homelab

        - CouchDB:
            icon: couchdb.png
            href: https://couchdb.daviddelporte.com/_utils
            description: Obsidian sync
            namespace: obsidian
            app: couchdb
            podSelector: "app=couchdb"

        - Apprise:
            icon: mdi-bell-ring
            href: https://apprise.daviddelporte.com
            description: Discord alerts
            namespace: monitoring
            app: apprise
            podSelector: "app.kubernetes.io/name=apprise"

  bookmarks.yaml: |
    - Quick Links:
        - GitHub Repo:
            - icon: github.png
              href: https://github.com/Yasuke2000/Homelab
        - Cloudflare:
            - icon: cloudflare.png
              href: https://dash.cloudflare.com
        - Tailscale:
            - icon: tailscale.png
              href: https://login.tailscale.com/admin/machines

    - Management:
        - Synology NAS:
            - icon: synology.png
              href: http://10.0.20.14:5000
        - Ghost Admin:
            - icon: ghost.png
              href: https://daviddelporte.com/ghost
        - Brevo (Email):
            - icon: mdi-email-fast
              href: https://app.brevo.com
        - Twitch Dev (IGDB):
            - icon: twitch.png
              href: https://dev.twitch.tv/console

    - Tools:
        - Grafana Homelab Dashboard:
            - icon: grafana.png
              href: https://grafana.daviddelporte.com/d/homelab-overview
        - Longhorn Volumes:
            - icon: longhorn.png
              href: https://longhorn.daviddelporte.com/#/volume
        - ArgoCD Apps:
            - icon: argocd.png
              href: https://argocd.daviddelporte.com/applications

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""
  custom.css: ""
  custom.js: ""
