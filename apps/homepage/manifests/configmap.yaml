---
# ---------------------------------------------------------------------------
# Homepage config via ConfigMap — volledig GitOps-beheerd
# TODO: vervang alle yourdomain.com door jouw domein
# Docs: https://gethomepage.dev/configs/
# ---------------------------------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab
    favicon: https://home.yourdomain.com/favicon.ico  # TODO
    theme: dark
    color: slate
    headerStyle: boxed
    layout:
      Infrastructure:
        icon: mdi-server-network
        style: row
        columns: 4
      Media:
        icon: mdi-play-circle
        style: row
        columns: 3
      Apps:
        icon: mdi-apps
        style: row
        columns: 4
      Monitoring:
        icon: mdi-chart-line
        style: row
        columns: 3

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - icon: github.png
              href: https://github.com/YOUR_GITHUB_USERNAME/homelab  # TODO
        - ArgoCD:
            - icon: argocd.png
              href: https://argocd.yourdomain.com  # TODO
        - Longhorn:
            - icon: longhorn.png
              href: https://longhorn.yourdomain.com  # TODO

  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            icon: argocd.png
            href: https://argocd.yourdomain.com     # TODO
            description: GitOps deployments
            namespace: argocd
            app: argocd-server

        - Traefik:
            icon: traefik.png
            href: https://traefik.yourdomain.com    # TODO
            description: Ingress controller

        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.yourdomain.com   # TODO
            description: Distributed storage

        - TrueNAS:
            icon: truenas.png
            href: http://10.0.20.14                 # direct IP, geen TLS op NAS
            description: NAS storage

    - Media:
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.yourdomain.com   # TODO
            description: Media server
            namespace: media
            app: jellyfin

        - Jellyseerr:
            icon: jellyseerr.png
            href: https://requests.yourdomain.com   # TODO
            description: Media requests
            namespace: media
            app: jellyseerr

        - RomM:
            icon: mdi-controller-classic
            href: https://romm.yourdomain.com       # TODO
            description: ROM manager

    - Apps:
        - Vaultwarden:
            icon: vaultwarden.png
            href: https://vault.yourdomain.com      # TODO
            description: Password manager
            namespace: vaultwarden
            app: vaultwarden

        - Actual Budget:
            icon: actual.png
            href: https://budget.yourdomain.com     # TODO
            description: Personal finance

        - SilverBullet:
            icon: mdi-notebook-edit
            href: https://notes.yourdomain.com      # TODO
            description: Notes & wiki

        - Shelf:
            icon: mdi-bookshelf
            href: https://shelf.yourdomain.com      # TODO
            description: Library manager

        - Ghost:
            icon: ghost.png
            href: https://yourdomain.com            # TODO
            description: Website / blog

        - Pelican:
            icon: mdi-gamepad-variant
            href: https://games.yourdomain.com      # TODO
            description: Game servers

    - Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://grafana.yourdomain.com    # TODO
            description: Metrics & dashboards
            namespace: monitoring
            app: kube-prometheus-stack-grafana

        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://status.yourdomain.com     # TODO
            description: Uptime monitoring
            namespace: monitoring
            app: uptime-kuma

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: homelab
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    - search:
        provider: duckduckgo
        target: _blank

    - datetime:
        text_size: x1
        format:
          timeStyle: short
          dateStyle: short
          hourCycle: h23

  kubernetes.yaml: |
    mode: cluster   # uses the ServiceAccount we created
