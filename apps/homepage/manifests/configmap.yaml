---
# ---------------------------------------------------------------------------
# Homepage config via ConfigMap — volledig GitOps-beheerd
# Docs: https://gethomepage.dev/configs/
# ---------------------------------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab
    favicon: https://home.daviddelporte.com/favicon.ico
    theme: dark
    color: slate
    headerStyle: boxed
    layout:
      Infrastructure:
        icon: mdi-server-network
        style: row
        columns: 4
      Media:
        icon: mdi-play-circle
        style: row
        columns: 3
      Apps:
        icon: mdi-apps
        style: row
        columns: 4
      Monitoring:
        icon: mdi-chart-line
        style: row
        columns: 3

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - icon: github.png
              href: https://github.com/Yasuke2000/Homelab
        - ArgoCD:
            - icon: argocd.png
              href: https://argocd.daviddelporte.com
        - Longhorn:
            - icon: longhorn.png
              href: https://longhorn.daviddelporte.com

  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            icon: argocd.png
            href: https://argocd.daviddelporte.com
            description: GitOps deployments
            namespace: argocd
            app: argocd-server

        - Traefik:
            icon: traefik.png
            href: https://traefik.daviddelporte.com
            description: Ingress controller

        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.daviddelporte.com
            description: Distributed storage

        - TrueNAS:
            icon: truenas.png
            href: http://10.0.20.14
            description: NAS storage

    - Media:
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.daviddelporte.com
            description: Media server
            namespace: media
            app: jellyfin

        - Jellyseerr:
            icon: jellyseerr.png
            href: https://requests.daviddelporte.com
            description: Media requests
            namespace: media
            app: jellyseerr

        - RomM:
            icon: mdi-controller-classic
            href: https://romm.daviddelporte.com
            description: ROM manager

    - Apps:
        - Vaultwarden:
            icon: vaultwarden.png
            href: https://vault.daviddelporte.com
            description: Password manager
            namespace: vaultwarden
            app: vaultwarden

        - Actual Budget:
            icon: actual.png
            href: https://budget.daviddelporte.com
            description: Personal finance

        - SilverBullet:
            icon: mdi-notebook-edit
            href: https://notes.daviddelporte.com
            description: Notes & wiki

        - Shelf:
            icon: mdi-bookshelf
            href: https://shelf.daviddelporte.com
            description: Library manager

        - Ghost:
            icon: ghost.png
            href: https://daviddelporte.com
            description: Website / blog

        - Pelican:
            icon: mdi-gamepad-variant
            href: https://games.daviddelporte.com
            description: Game servers

    - Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://grafana.daviddelporte.com
            description: Metrics & dashboards
            namespace: monitoring
            app: kube-prometheus-stack-grafana

        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://status.daviddelporte.com
            description: Uptime monitoring
            namespace: uptime-kuma
            app: uptime-kuma

        - Apprise:
            icon: mdi-bell-ring
            href: https://apprise.daviddelporte.com
            description: Notification gateway
            namespace: monitoring
            app: apprise

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: homelab
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    - search:
        provider: duckduckgo
        target: _blank

    - datetime:
        text_size: x1
        format:
          timeStyle: short
          dateStyle: short
          hourCycle: h23

  kubernetes.yaml: |
    mode: cluster   # uses the ServiceAccount we created
