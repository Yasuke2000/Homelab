---
# ---------------------------------------------------------------------------
# Shelf.nu — asset/library management
# Supabase project: vmqdtdkpubuhbkkmielq (eu-west-1)
# ---------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelf
  namespace: shelf
  labels:
    app: shelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shelf
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: shelf
    spec:
      containers:
        - name: shelf
          image: ghcr.io/shelf-nu/shelf.nu:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: SERVER_URL
              value: "https://shelf.daviddelporte.com"
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shelf-secrets
                  key: supabaseUrl
            - name: SUPABASE_ANON_PUBLIC
              valueFrom:
                secretKeyRef:
                  name: shelf-secrets
                  key: supabaseAnonPublic
            - name: SUPABASE_SERVICE_ROLE
              valueFrom:
                secretKeyRef:
                  name: shelf-secrets
                  key: supabaseServiceRole
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shelf-secrets
                  key: databaseUrl
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: shelf-secrets
                  key: directUrl
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: shelf-secrets
                  key: sessionSecret
          volumeMounts:
            - name: data
              mountPath: /data
            - name: app-config-logs
              mountPath: /app/config/logs
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shelf-data
        - name: app-config-logs
          emptyDir: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shelf-data
  namespace: shelf
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: shelf
  namespace: shelf
spec:
  selector:
    app: shelf
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shelf
  namespace: shelf
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - secretName: shelf-tls
      hosts:
        - shelf.daviddelporte.com
  rules:
    - host: shelf.daviddelporte.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shelf
                port:
                  number: 8080
