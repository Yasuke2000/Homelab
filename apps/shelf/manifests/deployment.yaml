---
# ---------------------------------------------------------------------------
# Shelf.nu — asset/library management
# TODO: set domain
# ---------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelf
  namespace: shelf
  labels:
    app: shelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shelf
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: shelf
    spec:
      containers:
        - name: shelf
          image: ghcr.io/shelf-nu/shelf.nu:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: SERVER_URL
              value: "https://shelf.daviddelporte.com"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: shelf-secrets
                  key: sessionSecret  # TODO: add to secrets/secrets.yaml
            # TODO: configure database URL (uses SQLite by default)
            # - name: DATABASE_URL
            #   value: "file:/data/shelf.db"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shelf-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shelf-data
  namespace: shelf
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: shelf
  namespace: shelf
spec:
  selector:
    app: shelf
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shelf
  namespace: shelf
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  ingressClassName: traefik
  tls:
    - secretName: shelf-tls
      hosts:
        - shelf.daviddelporte.com  # TODO
  rules:
    - host: shelf.daviddelporte.com  # TODO
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shelf
                port:
                  number: 8080
