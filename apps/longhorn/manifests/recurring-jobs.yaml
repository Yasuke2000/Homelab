---
# ---------------------------------------------------------------------------
# Longhorn RecurringJobs — automatic snapshots and backups
#
# Daily snapshots: 03:00, retain 7
# Weekly backup to Synology NFS: Sunday 04:00, retain 4
#
# NOTE: backup target is set in apps/longhorn/application.yaml:
#   backupTarget: "nfs://10.0.20.14:/volume1/longhorn-backup"
# Requires Synology NFS share /volume1/longhorn-backup to exist.
# ---------------------------------------------------------------------------

apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-daily
  namespace: longhorn-system
spec:
  cron: "0 3 * * *"
  task: "snapshot"
  groups:
    - default
  retain: 7
  concurrency: 2
  labels:
    type: snapshot

---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-weekly
  namespace: longhorn-system
spec:
  cron: "0 4 * * 0"
  task: "backup"
  groups:
    - default
  retain: 4
  concurrency: 1
  labels:
    type: backup
