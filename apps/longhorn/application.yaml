---
# ---------------------------------------------------------------------------
# Longhorn v1.11.1 — distributed block storage
#
# CRITICAL: Requires Kyverno PATH fix for NixOS.
# infrastructure/kyverno-longhorn-fix.yaml MUST be applied first.
# sync-wave "-1" ensures Kyverno policy exists before Longhorn pods start.
#
# NFS backup target: Synology DS918+ at 10.0.20.14 / volume1/longhorn-backup
#
# v1.11.0 → v1.11.1: fixes critical memory leak in instance-manager
# (proxy connection leak, GitHub #12643/#12668, 5+ GiB per instance-manager)
# ---------------------------------------------------------------------------

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # Kyverno policy must exist first
spec:
  project: default

  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: "1.11.1"
    helm:
      valuesObject:
        preUpgradeChecker:
          jobEnabled: false  # Disabled: pre-upgrade job fails on fresh install via ArgoCD (namespace env var bug)

        defaultSettings:
          # 2 replicas: survives single node failure, saves ~33% memory/storage
          # 3-node cluster with 2 replicas = 1 node can fail without data loss
          defaultReplicaCount: 2

          # NFS backup target on Synology DS918+
          backupTarget: "nfs://10.0.20.14:/volume1/longhorn-backup"
          backupTargetCredentialSecret: ""

          # Where replicas store data on each node
          defaultDataPath: /var/lib/longhorn

          # Don't schedule replicas on same node
          replicaSoftAntiAffinity: false

          # Auto-balance replicas when a new node is added
          replicaAutoBalance: best-effort

          # CPU reservation for instance-managers (lower = more headroom)
          guaranteedInstanceManagerCPU: 6

          # Limit concurrent rebuilds to reduce peak memory
          concurrentReplicaRebuildPerNodeLimit: 1

          # Auto-clean system snapshots to reduce read index memory
          autoCleanupSystemGeneratedSnapshot: true

        persistence:
          defaultClassReplicaCount: 2

        longhornUI:
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - # TODO: set your Longhorn dashboard domain
                host: longhorn.daviddelporte.com
                paths:
                  - /
            tls:
              - secretName: longhorn-tls
                hosts:
                  - longhorn.daviddelporte.com  # TODO

        # Tolerate control-plane taint (all nodes are control-plane + worker)
        longhornManager:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists
        longhornDriver:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists

  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
