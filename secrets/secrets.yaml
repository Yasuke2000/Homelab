# ---------------------------------------------------------------------------
# secrets/secrets.yaml — TEMPLATE (NOT YET ENCRYPTED)
#
# THIS FILE MUST BE ENCRYPTED WITH SOPS BEFORE COMMITTING.
# Run: sops secrets/secrets.yaml
# Then fill in values and save — sops encrypts on write.
#
# Structure expected by NixOS modules:
#   sops.secrets."k3s/token"          → services.k3s.tokenFile
#   sops.secrets."vaultwarden/env"    → env file for Vaultwarden pod
#   etc.
# ---------------------------------------------------------------------------
#
# DO NOT COMMIT THIS FILE IN PLAINTEXT.
# .gitignore has a safeguard but sops encryption is the real protection.
#
# After encrypting, this file will look like:
#   k3s:
#       token: ENC[AES256_GCM,data:...,tag:...,type:str]
#   ...
#   sops:
#       kms: []
#       age:
#           - recipient: age1...
#             enc: |
#                 -----BEGIN AGE ENCRYPTED FILE-----
#                 ...
# ---------------------------------------------------------------------------

k3s:
    # TODO: generate a strong random token
    # Suggestion: openssl rand -hex 32
    token: REPLACE_WITH_STRONG_RANDOM_TOKEN

vaultwarden:
    # TODO: admin token for /admin panel
    # Generate: openssl rand -base64 48
    adminToken: REPLACE_WITH_ADMIN_TOKEN

    # TODO: SMTP credentials for email notifications
    smtpUsername: REPLACE_WITH_SMTP_USER
    smtpPassword: REPLACE_WITH_SMTP_PASS

actualBudget:
    # TODO: password for Actual Budget
    password: REPLACE_WITH_PASSWORD

ghost:
    # TODO: Ghost database password
    dbPassword: REPLACE_WITH_DB_PASSWORD

bookstack:
    # TODO: BookStack app key (32 char random)
    # Generate: openssl rand -base64 24
    appKey: REPLACE_WITH_APP_KEY
    dbPassword: REPLACE_WITH_DB_PASSWORD

renovate:
    # TODO: GitHub token for Renovate bot
    # Needs: repo, read:org permissions
    githubToken: REPLACE_WITH_GITHUB_PAT
