# ---------------------------------------------------------------------------
# secrets/secrets.yaml — TEMPLATE (NOT YET ENCRYPTED)
#
# THIS FILE MUST BE ENCRYPTED WITH SOPS BEFORE COMMITTING.
# Run: sops secrets/secrets.yaml
# Then fill in values and save — sops encrypts on write.
# ---------------------------------------------------------------------------
#
# DO NOT COMMIT THIS FILE IN PLAINTEXT.

k3s:
    # Generate: openssl rand -hex 32
    token: REPLACE_WITH_STRONG_RANDOM_TOKEN

vaultwarden:
    # Generate: openssl rand -base64 48
    adminToken: REPLACE_WITH_ADMIN_TOKEN
    smtpUsername: REPLACE_WITH_SMTP_USER
    smtpPassword: REPLACE_WITH_SMTP_PASS

actualBudget:
    password: REPLACE_WITH_PASSWORD

ghost:
    dbPassword: REPLACE_WITH_DB_PASSWORD

silverbullet:
    # Generate: openssl rand -base64 32
    password: REPLACE_WITH_PASSWORD

shelf:
    # Generate: openssl rand -base64 32
    sessionSecret: REPLACE_WITH_SESSION_SECRET

romm:
    dbPassword: REPLACE_WITH_DB_PASSWORD
    # Generate: openssl rand -hex 32
    secretKey: REPLACE_WITH_SECRET_KEY

pelican:
    dbPassword: REPLACE_WITH_DB_PASSWORD

grafana:
    # Change after first login
    adminPassword: REPLACE_WITH_ADMIN_PASSWORD

renovate:
    # GitHub PAT: needs repo + read:org permissions
    githubToken: REPLACE_WITH_GITHUB_PAT
